<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#FDF6E3"/>

  <!-- Top bar -->
  <rect width="1200" height="12" fill="#2D5F2D"/>

  <!-- Bottom bar -->
  <rect y="618" width="1200" height="12" fill="#2D5F2D"/>

  <!-- Left accent bar -->
  <rect x="80" y="12" width="6" height="606" fill="#D4A843" opacity="0.4"/>

  <!-- Paw print icon -->
  <g transform="translate(100, 180)">
    <!-- Top left toe -->
    <ellipse cx="52" cy="28" rx="20" ry="26" fill="#2D5F2D" opacity="0.85"/>
    <!-- Top right toe -->
    <ellipse cx="118" cy="28" rx="20" ry="26" fill="#2D5F2D" opacity="0.85"/>
    <!-- Far left toe -->
    <ellipse cx="20" cy="80" rx="16" ry="22" fill="#2D5F2D" opacity="0.85"/>
    <!-- Far right toe -->
    <ellipse cx="150" cy="80" rx="16" ry="22" fill="#2D5F2D" opacity="0.85"/>
    <!-- Main pad -->
    <path d="M85 60 C50 60 28 82 28 110 C28 135 55 158 85 158 C115 158 142 135 142 110 C142 82 120 60 85 60 Z" fill="#2D5F2D"/>
  </g>

  <!-- Main heading -->
  <text
    x="330"
    y="270"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="96"
    font-weight="800"
    fill="#2D5F2D"
    letter-spacing="-2"
  >BreedHealth</text>

  <!-- Amber underline accent -->
  <rect x="330" y="288" width="560" height="6" rx="3" fill="#D4A843"/>

  <!-- Subtitle -->
  <text
    x="330"
    y="360"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="36"
    font-weight="400"
    fill="#6b4f42"
  >Dog Breed Health &amp; Care Guide</text>

  <!-- Tag line -->
  <text
    x="330"
    y="420"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="24"
    font-weight="400"
    fill="#9c7b70"
  >400+ breeds · health conditions · diet &amp; nutrition</text>

  <!-- Bottom brand strip -->
  <rect x="0" y="550" width="1200" height="68" fill="#2D5F2D" opacity="0.06"/>
  <text
    x="600"
    y="592"
    text-anchor="middle"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="20"
    font-weight="600"
    fill="#2D5F2D"
    opacity="0.7"
  >breedhealth.com</text>
</svg>
